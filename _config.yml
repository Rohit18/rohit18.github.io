description: > # description of the site (multiple lines allowed)
  Postdoctoral researcher in the social [pixel] lab at the University of Arizona's School of Geography, Development, and Environment since June 2021.


  Previosuly, PhD in Geography (2016 to 2020) from Ohio State University on improving satellite imagery using deep learning superresolution and translation methods.  Masters in GIScience (BIT Mesra, India), and Bachelors in Computer Science (St. Xaveier's College, Calcutta, India).


  Workinon three projects: Mapping Urban Floods, Surface Water, River Width, and illicit infrastructure in Central America.
  Currently living in sunny Tucson, Arizona.

